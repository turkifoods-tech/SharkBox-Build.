name: Build SharkOs Binary
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Setup ESP32 Support
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          # Specifically installing the ESP32 version that supports S3
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install Libraries
        run: |
          arduino-cli lib install "Keypad"
          arduino-cli lib install "TFT_eSPI"
          arduino-cli lib install "TJpg_Decoder"

      - name: Compile SharkOs
        run: |
          # Ensuring we target the ESP32-S3 Dev Module specifically
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir ./build SharkOs.ino

      - name: Upload Binary
        uses: actions/upload-artifact@v3
        with:
          name: SharkBox-Firmware
          path: ./build/*.bin
          
